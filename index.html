<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Reversal | 12.05</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020408;
            --card-bg: rgba(13, 17, 23, 0.85);
            --accent-blue: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --ida-gray: #30363d;
            --discord-blurple: #5865F2;
            --success-green: #238636;
        }

        * {
            cursor: none !important;
        }

        #cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-blue);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .cursor-click {
            transform: scale(0.7) !important;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.12;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translate(-50%, 20px);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(270deg, #ffffff, var(--accent-blue), #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s linear infinite;
        }

        .top-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        #searchBar {
            flex: 1;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--ida-gray);
            background: var(--card-bg);
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
        }

            #searchBar:focus {
                border-color: var(--accent-blue);
            }

        .discord-btn {
            background: var(--discord-blurple);
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s ease;
        }

            .discord-btn:hover {
                filter: brightness(1.2);
                transform: translateY(-2px);
            }

        .section-title {
            color: var(--accent-blue);
            text-transform: uppercase;
            font-size: 11px;
            margin: 50px 0 20px 0;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .section-title::after {
                content: "";
                height: 1px;
                flex: 1;
                background: linear-gradient(90deg, var(--ida-gray), transparent);
            }

        .interactive {
            background: var(--card-bg);
            border: 1px solid var(--ida-gray);
            backdrop-filter: blur(12px);
            border-radius: 8px;
            transition: 0.15s ease-in-out;
            opacity: 0;
            animation: fadeIn 0.4s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .interactive:hover {
            border-color: var(--accent-blue);
            transform: scale(1.02) translateY(-2px);
            background: rgba(88, 166, 255, 0.05);
        }

        .offset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .offset-card {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .val-text {
            font-family: 'Courier New', monospace;
            color: var(--accent-blue);
            font-size: 15px;
            font-weight: bold;
        }

        .sig-row {
            padding: 20px;
            margin-bottom: 12px;
        }

        .sig-data {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
            border: 1px dashed var(--ida-gray);
        }

        pre {
            padding: 20px;
            margin: 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #e6edf3;
            overflow-x: auto;
        }

        #toast {
            visibility: hidden;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success-green);
            color: white;
            padding: 10px 25px;
            border-radius: 4px;
            font-weight: bold;
            z-index: 10000;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .show {
            visibility: visible !important;
            animation: popIn 0.2s ease-out;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="cursor"></div>

    <div class="container">
        <header><h1>VALORANT REVERSAL</h1></header>

        <div class="top-bar">
            <input type="text" id="searchBar" placeholder="Search memory..." onkeyup="search()">
            <a href="https://discord.gg/tozic" target="_blank" class="discord-btn"><i class="fab fa-discord"></i> DISCORD SERVER</a>
        </div>

        <div id="content">
            <span class="section-title">Memory Offsets</span>
            <div class="offset-grid" id="offsetGrid"></div>
            <span class="section-title">Signatures</span>
            <div id="sigGrid"></div>
            <span class="section-title">Pseudocode</span>
            <div id="codeVault"></div>
        </div>
    </div>

    <div id="toast">Value copied to clipboard!</div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;
        const fontSize = 16;
        const chars = "01";

        function initBg() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        columns = Math.floor(width / fontSize);
        drops = new Array(columns).fill(1);
        }

        function drawBg() {
        ctx.fillStyle = "rgba(2, 4, 8, 0.15)";
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#58a6ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
        }
        }
        initBg(); setInterval(drawBg, 50);
        window.onresize = initBg;

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX - 10 + 'px';
        cursor.style.top = e.clientY - 10 + 'px';
        });

        document.addEventListener('mousedown', () => cursor.classList.add('cursor-click'));
        document.addEventListener('mouseup', () => cursor.classList.remove('cursor-click'));

        async function loadData() {
        try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error();
        const data = await res.json();
        render(data);
        } catch (err) {
        document.getElementById('content').innerHTML = `<p style="text-align:center; color:red; margin-top:50px;">Check data.json formatting.</p>`;
        }
        }

        function render(data) {
        const oGrid = document.getElementById('offsetGrid');
        const sGrid = document.getElementById('sigGrid');
        const cGrid = document.getElementById('codeVault');

        data.offsets.forEach((o, i) => {
        const el = document.createElement('div');
        el.className = 'offset-card interactive';
        el.style.animationDelay = (i * 0.03) + 's';
        el.onclick = () => copy(o.val);
        el.innerHTML = `<div><b>${o.name}</b><br><span class="val-text">${o.val}</span></div><i class="far fa-copy" style="opacity:0.2"></i>`;
        oGrid.appendChild(el);
        });

        data.sigs.forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'sig-row interactive';
        el.style.animationDelay = (i * 0.05) + 's';
        el.onclick = () => copy(s.sig);
        el.innerHTML = `<div style="display:flex; justify-content:space-between"><b>${s.name}</b><i class="fas fa-fingerprint" style="color:var(--accent-blue)"></i></div><div class="sig-data">${s.sig}</div>`;
        sGrid.appendChild(el);
        });

        data.code.forEach(c => {
        const el = document.createElement('div');
        el.className = 'interactive';
        el.style.marginBottom = "20px";
        el.onclick = () => copy(c.content);
        el.innerHTML = `<div style="padding:15px; background:rgba(88,166,255,0.05); border-bottom:1px solid var(--ida-gray);"><b>${c.title}</b></div><pre>${c.content}</pre>`;
        cGrid.appendChild(el);
        });
        }

        function search() {
        let q = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.interactive').forEach(el => {
        el.style.display = el.innerText.toLowerCase().includes(q) ? '' : 'none';
        });
        }

        function copy(text) {
        navigator.clipboard.writeText(text);
        const t = document.getElementById('toast');
        t.className = "show";
        setTimeout(() => { t.className = ""; }, 2000);

        cursor.style.transform = "scale(1.5)";
        setTimeout(() => { cursor.style.transform = "scale(1)"; }, 100);
        }

        window.onload = loadData;
    </script>
</body>
</html>
